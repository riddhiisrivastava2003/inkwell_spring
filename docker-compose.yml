version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: inkwell-mysql
    environment:
      MYSQL_ROOT_PASSWORD: RIDsriv9683@
      MYSQL_DATABASE: scriptly_auth
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: inkwell-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7.2
    container_name: inkwell-redis
    ports:
      - "6379:6379"

  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: inkwell-smtp4dev
    ports:
      - "2525:25"
      - "5000:80"

volumes:
  mysql_data:
