spring.application.name=auth-service
server.port=8081
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:mysql://localhost:3306/scriptly_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

auth.jwt.secret=QWJjZEVmZ0hpSmtMbW5PcFFyU3RVdld4WXpBQkNERUZHSElKS0xtbm9w
auth.jwt.expiration-ms=86400000
auth.admin.registration-key=INKWELL_ADMIN_2026
app.frontend-base-url=http://localhost:5173
auth.password-reset.expiry-minutes=30

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
auth.mail.from=${AUTH_MAIL_FROM:${SMTP_USERNAME:}}

# OAuth config moved to application-oauth.properties.
# Enable profile "oauth" only when you want social login locally.
spring.profiles.include=oauth
spring.config.import=optional:classpath:application-oauth.properties

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

services.post.base-url=http://localhost:8082
services.comment.base-url=http://localhost:8083



eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
